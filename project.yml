name: Tesara
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0
targets:
  Tesara:
    type: application
    platform: macOS
    sources:
      - path: Tesara
        excludes:
          - Resources
      - path: Tesara/Resources/TerminalIntegration
        buildPhase: resources
        type: folder
    info:
      path: Tesara/Info.plist
    preBuildScripts:
      - name: Build libghostty
        script: |
          set -euo pipefail
          EXPECTED_ZIG=$(cat "$SRCROOT/.zig-version" | tr -d '[:space:]')
          if [ -z "$EXPECTED_ZIG" ]; then
            echo "error: .zig-version is empty or missing"
            exit 1
          fi
          ZIG=$(command -v zig || echo "/opt/homebrew/bin/zig")
          if [ ! -x "$ZIG" ]; then
            echo "error: Zig not found. Install $EXPECTED_ZIG with: brew install zig"
            exit 1
          fi
          ACTUAL_ZIG=$("$ZIG" version)
          if [ "$ACTUAL_ZIG" != "$EXPECTED_ZIG" ]; then
            echo "error: Zig version mismatch: expected $EXPECTED_ZIG, found $ACTUAL_ZIG"
            exit 1
          fi
          cd "$SRCROOT/vendor/ghostty"
          PATCH="$SRCROOT/vendor/patches/ghostty-build.patch"
          if git apply --check "$PATCH" 2>/dev/null; then
            git apply "$PATCH"
          fi
          "$ZIG" build -Doptimize=ReleaseFast -Dapp-runtime=none -Demit-xcframework=false
        outputFiles:
          - $(SRCROOT)/vendor/ghostty/zig-out/lib/libghostty.a
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samsolomon.tesara
        PRODUCT_NAME: Tesara
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: 5.10
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9ZLX6W79P6
        CODE_SIGN_ENTITLEMENTS: Tesara/Tesara.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_KEY_CFBundleDisplayName: Tesara
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright 2026 Sam Solomon
        SWIFT_OBJC_BRIDGING_HEADER: Tesara/Tesara-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/ghostty/zig-out/include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/vendor/ghostty/zig-out/lib
        OTHER_LDFLAGS:
          - -lghostty
          - -lc++
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Sparkle
        product: Sparkle
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
      - sdk: CoreText.framework
      - sdk: CoreGraphics.framework
      - sdk: IOSurface.framework
      - sdk: IOKit.framework
      - sdk: Carbon.framework
    scheme:
      testTargets:
        - TesaraTests
  TesaraTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TesaraTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samsolomon.tesaraTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.10
        DEVELOPMENT_TEAM: 9ZLX6W79P6
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/ghostty/zig-out/include
    dependencies:
      - target: Tesara
